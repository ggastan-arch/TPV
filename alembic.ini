# Configuracion de Alembic. La URL real se resuelve en migrations/env.py
# a partir de app.core.config (o del override que pase el runner de tests).
[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# NO fijar una URL aqui: `resolver_url_migracion` (app/infraestructura/db.py) la
# prioriza sobre `settings.database_url`, de modo que un valor concreto haria que
# `alembic upgrade head` (make migrate) migrara ESA BD y no la real de produccion
# (`TPV_DB_PATH` del .env, p.ej. tpv_pruebas.db). Vacia => cae a settings; env.py
# la resuelve. El runner de scratch/tests/demo pasa la suya explicita (-x o
# set_main_option), que tiene prioridad.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
