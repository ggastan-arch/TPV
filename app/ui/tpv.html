<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TPV AcuaTPV</title>
<link rel="stylesheet" href="/static/nocturne.css">
<script src="/static/nocturne-icons.js"></script>
<style>
  /* Hoja puente (page-scoped) de tpv.html: remapea sobre los tokens Nocturne los
     nombres de clase que el <script> de esta pagina genera via innerHTML
     (pintarBotonera/abrirFamilia/buscar/render/pantallaLogin/abrirCobro/cobrar),
     SIN tocar ese <script> en el camino de cobro (ver design.md). */
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; overflow:hidden; }
  body { font-family:var(--font-body); background:var(--color-bg); color:var(--color-text); }
  #app { display:flex; flex-direction:column; height:100vh; }
  .fila-principal { flex:1; display:flex; min-height:0; }
  .col-botonera { flex:1; display:flex; flex-direction:column; padding:var(--space-3); min-width:0; gap:var(--space-2); }
  .col-carrito { width:34%; max-width:420px; background:var(--color-surface); display:flex; flex-direction:column; border-left:1px solid var(--color-divider); }
  header { display:flex; align-items:center; gap:var(--space-3); padding:var(--space-2) var(--space-3); }
  /* Marca de AcuaTPV en la cabecera: el logo real trae fondo claro propio, asi
     que se enmarca pequeno en una superficie clara (como el header del diseno
     de referencia) en vez de mostrarse a tamano completo sobre el fondo oscuro. */
  .brand-mark-sm { flex:none; width:38px; height:38px; border-radius:var(--radius-md); background:#f4fafe;
                   box-shadow:var(--shadow-sm); display:flex; align-items:center; justify-content:center;
                   padding:4px; overflow:hidden; }
  .brand-mark-sm img { width:100%; height:100%; object-fit:contain; display:block; }
  header .breadcrumb { flex:1; font-family:var(--font-heading); font-size:18px; color:color-mix(in srgb, var(--color-text) 60%, transparent); }
  .usuario-info { display:flex; align-items:center; gap:6px; color:color-mix(in srgb, var(--color-text) 60%, transparent); }
  .usuario-info [data-icono] svg { width:18px; height:18px; display:block; }
  header .usuario { font-size:14px; }
  .enlace-admin { display:inline-flex; align-items:center; gap:6px; color:color-mix(in srgb, var(--color-text) 60%, transparent);
                  font-size:14px; text-decoration:none; border:1px solid var(--color-divider);
                  border-radius:var(--radius-md); padding:8px 14px; }
  .enlace-admin:hover { border-color:var(--color-accent); color:var(--color-accent); }
  .enlace-admin [data-icono] svg { width:16px; height:16px; display:block; }

  /* Botones tactiles: el .btn compacto de Nocturne (pensado para formularios de
     consola) no encaja como tarjeta grande de venta; #app lo reescala como
     superficie Nocturne conservando SIEMPRE el objetivo tactil minimo. */
  #app .btn {
    position:relative; overflow:hidden; border:1px solid var(--color-divider);
    border-radius:var(--radius-md); background:var(--color-surface); color:var(--color-text);
    font-family:var(--font-heading); font-weight:var(--font-heading-weight); font-size:16px;
    padding:12px; cursor:pointer; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:4px; text-align:center; box-shadow:var(--shadow-sm);
    transition:transform .06s ease, filter .06s ease, border-color .12s ease;
  }
  #app .btn:active { transform:scale(.97); filter:brightness(1.15); }
  /* Requisito de superficie tactil (áreas interactivas de venta, WCAG 2.5.5): */
  #app .btn{min-height:48px}

  .grid { flex:1; display:grid; gap:var(--space-3); grid-auto-rows:170px; align-content:start; overflow-y:auto; padding:4px; }
  .grid .btn:hover { border-color:var(--color-accent); }
  .b-articulo { background:var(--color-surface); }
  .b-familia { background:var(--color-accent-800); border-color:var(--color-accent-700); color:var(--color-accent-100); }
  .b-funcion { background:var(--color-neutral-800); }
  .b-inicio { min-height:auto !important; padding:8px 16px; background:transparent; }
  .b-inicio [data-icono] svg { width:16px; height:16px; display:block; }

  .btn.con-img { justify-content:flex-end; padding:0; }
  .b-img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
  .b-fallback { display:flex; align-items:center; justify-content:center; color:color-mix(in srgb, var(--color-text) 40%, transparent); }
  .b-fallback svg { width:32px; height:32px; display:block; }
  .b-cap { position:relative; z-index:1; width:100%; display:flex; flex-direction:column; align-items:center; gap:1px; }
  .btn.con-img .b-cap { padding:8px 6px 7px; background:linear-gradient(to top, rgba(2,6,23,.92) 25%, rgba(2,6,23,0)); }
  .b-tit { line-height:1.15; text-shadow:0 1px 3px rgba(0,0,0,.75); }
  .b-precio { font-size:15px; opacity:.95; font-weight:600; color:var(--color-accent-300); text-shadow:0 1px 3px rgba(0,0,0,.75); }
  .cites { font-size:12px; background:#b45309; border-radius:6px; padding:1px 6px; color:#fff; }

  .buscador { display:flex; align-items:center; gap:8px; padding:0 4px var(--space-2); }
  .buscador .lupa { display:flex; color:color-mix(in srgb, var(--color-text) 55%, transparent); }
  .buscador .lupa svg { width:20px; height:20px; display:block; }
  .campo-buscar { flex:1; min-height:48px; font-size:16px; padding:10px 12px; border-radius:var(--radius-md);
                  border:1px solid var(--color-divider); background:var(--color-surface); color:var(--color-text); }
  .campo-buscar:focus-visible { border-color:var(--color-accent); outline:none; }

  .carrito-lineas { flex:1; overflow-y:auto; padding:var(--space-3); }
  .linea { display:flex; align-items:center; gap:8px; padding:10px 6px; border-bottom:1px solid var(--color-divider); }
  .linea .desc { flex:1; }
  .linea .cant { color:color-mix(in srgb, var(--color-text) 55%, transparent); font-size:14px; }
  .linea .tot { font-variant-numeric:tabular-nums; font-weight:600; }
  .linea .quita { background:transparent; border:1px solid var(--color-divider); color:color-mix(in srgb, var(--color-text) 55%, transparent);
                  border-radius:8px; width:38px; height:38px; min-height:38px; font-size:18px; cursor:pointer; }
  .linea .quita:hover { border-color:var(--color-accent); color:var(--color-accent); }
  .linea .editable { border-bottom:1px dashed var(--color-divider); cursor:pointer; padding:0 2px; }
  .linea .editable:active { background:color-mix(in srgb, var(--color-text) 8%, transparent); border-radius:4px; }

  .total { padding:14px; font-family:var(--font-heading); font-size:30px; font-weight:600; display:flex;
           justify-content:space-between; border-top:1px solid var(--color-divider); font-variant-numeric:tabular-nums; }
  .acciones { display:flex; gap:10px; padding:10px; }
  /* Prefijo #app: iguala la especificidad de `#app .btn{min-height:48px}`
     (que incluye un ID) para que estos min-height mas altos SI ganen — de otro
     modo un selector de solo clases nunca le gana a un selector con ID, sin
     importar el orden en la hoja. */
  #app .acciones .btn { flex:1; min-height:70px; }
  .b-cobrar { border-color:var(--color-accent); background:color-mix(in srgb, var(--color-accent) 16%, transparent);
              color:var(--color-accent-200); font-size:20px; }
  .b-cobrar [data-icono] svg { width:18px; height:18px; display:block; }
  .b-vaciar { background:transparent; flex:0 0 90px !important; }

  .barra-funciones { flex:none; display:flex; gap:8px; padding:10px var(--space-4); border-top:1px solid var(--color-divider);
                     background:color-mix(in srgb, var(--color-surface) 40%, var(--color-bg)); }
  .fn-btn { flex:1; min-height:60px !important; padding:8px 4px; background:transparent; }
  .fn-btn .fn-ico svg { width:20px; height:20px; display:block; }
  .fn-btn .fn-txt { font-size:12px; }

  .overlay { position:fixed; inset:0; background:color-mix(in srgb, var(--color-neutral-900) 65%, transparent);
             display:flex; align-items:center; justify-content:center; z-index:10; }
  .modal { background:var(--color-surface); border-radius:var(--radius-lg); padding:24px; width:min(92vw,440px); box-shadow:var(--shadow-lg); }
  .modal h2 { margin:0 0 14px; }
  .pinpad, .rapidos { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  /* Teclas tactiles reales (no texto plano): superficie con borde, realce en
     hover/active desde la rampa del acento, y min-height/min-width >= 56px. */
  .pinpad .btn, .rapidos .btn {
    min-height:66px; min-width:56px; background:var(--color-neutral-800);
    border:1px solid var(--color-divider); font-size:24px; font-weight:600; color:var(--color-text);
  }
  .pinpad .btn:hover, .rapidos .btn:hover {
    border-color:var(--color-accent); background:color-mix(in srgb, var(--color-accent) 16%, var(--color-neutral-800));
  }
  /* OK: distinguida como accion principal (contorno de acento, como .btn-primary).
     C: distinguida como accion secundaria (texto atenuado). */
  .pinpad .pin-ok {
    border-color:var(--color-accent); color:var(--color-accent-200);
    background:color-mix(in srgb, var(--color-accent) 18%, transparent);
  }
  .pinpad .pin-ok:hover { background:color-mix(in srgb, var(--color-accent) 26%, transparent); }
  .pinpad .pin-clear { color:color-mix(in srgb, var(--color-text) 65%, transparent); }
  .pin-display { text-align:center; font-size:34px; letter-spacing:10px; height:44px; margin:10px 0; }
  .campo { width:100%; font-size:26px; padding:12px; border-radius:var(--radius-md); border:1px solid var(--color-divider);
           background:var(--color-bg); color:var(--color-text); text-align:right; }
  .msg-error { color:#fca5a5; text-align:center; font-size:14px; font-weight:600; min-height:22px; margin:2px 0 4px; }
  .ticket-ok { text-align:center; }
  .ticket-ok img { background:#fff; padding:8px; border-radius:8px; margin:10px auto; display:block; }
  .fila-modal { display:flex; gap:10px; margin-top:12px; }
  .fila-modal .btn { flex:1; }

  /* Retonado a la paleta de acento de Nocturne (antes ambar #b45309, que
     desentonaba con el resto del sistema de diseno). */
  #demoBanner { display:none; position:fixed; top:6px; left:50%; transform:translateX(-50%); z-index:20;
                background:color-mix(in srgb, var(--color-accent) 20%, var(--color-neutral-900));
                border:1px solid var(--color-accent); color:var(--color-accent-100);
                padding:4px 16px; border-radius:999px; font-size:13px; font-weight:600;
                letter-spacing:.3px; pointer-events:none; box-shadow:var(--shadow-md); }
  #demoBanner [data-icono] svg { width:14px; height:14px; display:inline-block; vertical-align:-2px; margin-right:4px; color:var(--color-accent-300); }
  .ticket-demo { margin:12px auto; padding:10px; border:2px dashed #f59e0b; border-radius:10px; color:#fbbf24; font-weight:600; line-height:1.4; }
</style>
</head>
<body>
<div id="demoBanner"><span data-icono="flask" aria-hidden="true"></span>MODO DEMO &middot; datos de prueba &middot; SIN VALIDEZ FISCAL</div>
<div id="app">
  <div class="fila-principal">
  <div class="col-botonera">
    <header>
      <span class="brand-mark-sm"><img src="/static/img/logo-acuatpv.png" alt="AcuaTPV"></span>
      <button class="btn b-inicio" style="min-height:auto;padding:8px 16px" onclick="irInicio()">
        <span data-icono="house" aria-hidden="true"></span> Inicio</button>
      <div class="breadcrumb" id="breadcrumb">Venta</div>
      <div class="usuario-info">
        <span data-icono="user-circle" aria-hidden="true"></span>
        <span class="usuario" id="usuario"></span>
      </div>
      <a href="/admin/" class="enlace-admin"><span data-icono="gear" aria-hidden="true"></span> Administración</a>
    </header>
    <div class="buscador">
      <span class="lupa" data-icono="magnifying-glass" aria-hidden="true"></span>
      <input type="text" id="buscarInput" class="campo-buscar"
             placeholder="Buscar articulo por nombre..." oninput="onBuscarInput()">
    </div>
    <div class="grid" id="grid"></div>
  </div>
  <div class="col-carrito">
    <div class="carrito-lineas" id="carrito"></div>
    <div class="total"><span>TOTAL</span><span id="total">0,00 &euro;</span></div>
    <div class="acciones">
      <button class="btn b-vaciar" onclick="vaciar()">&#128465;</button>
      <button class="btn b-cobrar" onclick="abrirCobro()">COBRAR <span data-icono="arrow-right" aria-hidden="true"></span></button>
    </div>
  </div>
  </div>
  <footer class="barra-funciones">
    <button class="btn fn-btn" disabled title="Próximamente">
      <span class="fn-ico" data-icono="file-text" aria-hidden="true"></span>
      <span class="fn-txt">Convertir en factura</span>
    </button>
    <button class="btn fn-btn" disabled title="Próximamente">
      <span class="fn-ico" data-icono="pause-circle" aria-hidden="true"></span>
      <span class="fn-txt">Aparcar ticket</span>
    </button>
    <button class="btn fn-btn" disabled title="Próximamente">
      <span class="fn-ico" data-icono="play-circle" aria-hidden="true"></span>
      <span class="fn-txt">Desaparcar</span>
    </button>
    <button class="btn fn-btn" disabled title="Próximamente">
      <span class="fn-ico" data-icono="user-circle" aria-hidden="true"></span>
      <span class="fn-txt">Cliente en venta</span>
    </button>
  </footer>
</div>

<script>
"use strict";
const $ = (id) => document.getElementById(id);
let usuario = null;
let esDemo = false;    // se resuelve contra /health; oculta el QR de cotejo y marca el ticket
let carrito = [];      // {articulo_id, nombre_corto, modo_precio, cantidad, pvp?, descripcion?, editado}
let ultimoCalculo = null;

async function api(path, opts = {}) {
  const r = await fetch(path, { headers: { "Content-Type": "application/json" }, ...opts });
  if (!r.ok) {
    const detalle = await r.json().catch(() => ({}));
    throw new Error(detalle.detail || ("Error " + r.status));
  }
  return r.json();
}
const eur = (s) => (s ?? "0.00").toString().replace(".", ",") + " €";
// Imagen del destino (articulo/familia); "" cuando no hay -> el boton muestra un
// icono generico de relleno en vez del hueco vacio.
// Pinta el contenido de un boton: si hay imagen, la imagen llena el boton (clase
// con-img) y el titulo (+ precio opcional) va en una franja inferior; si no, un
// icono generico (Nocturne, /static/nocturne-icons.js) ocupa el lugar de la foto
// y el titulo va centrado debajo. Un unico punto para todos los botones
// (botonera, familia, buscador).
function pintarContenido(btn, imagen, titulo, precioHtml = "") {
  btn.classList.toggle("con-img", !!imagen);
  const img = imagen ? `<img class="b-img" src="${imagen}" alt="">` : "";
  const relleno = imagen ? "" : `<span class="b-fallback" aria-hidden="true">${icono("basket")}</span>`;
  const precio = precioHtml ? `<span class="b-precio">${precioHtml}</span>` : "";
  btn.innerHTML = `${img}${relleno}<span class="b-cap"><span class="b-tit">${titulo}</span>${precio}</span>`;
}
// Precio a mostrar en el boton: "/kg" cuando el articulo se vende al peso.
const precioBoton = (a) => eur(a.pvp) + (a.modo_precio === "al_peso" ? "/kg" : "");

/* ---------- LOGIN ---------- */
function pantallaLogin() {
  let pin = "";
  const ov = document.createElement("div");
  ov.className = "overlay";
  ov.innerHTML = `<div class="modal"><h2>Introduce tu PIN</h2>
    <div class="pin-display" id="pd"></div><div class="msg-error" id="pe"></div>
    <div class="pinpad" id="pp"></div></div>`;
  document.body.appendChild(ov);
  const pintar = () => { $("pd").textContent = "•".repeat(pin.length); };
  const pp = ov.querySelector("#pp");
  ["1","2","3","4","5","6","7","8","9","C","0","OK"].forEach((t) => {
    const b = document.createElement("button");
    // className extra solo a efectos visuales (distingue C/OK); onclick/flow intactos.
    b.className = "btn" + (t === "OK" ? " pin-ok" : t === "C" ? " pin-clear" : "");
    b.textContent = t;
    b.onclick = async () => {
      if (t === "C") { pin = ""; }
      else if (t === "OK") {
        try {
          usuario = await api("/tpv/api/login", { method:"POST", body:JSON.stringify({ pin }) });
          $("usuario").textContent = usuario.nombre + " (" + usuario.rol + ")";
          ov.remove(); iniciar();
        } catch (e) { $("pe").textContent = e.message; pin = ""; pintar(); }
        return;
      } else if (pin.length < 8) { pin += t; }
      pintar();
    };
    pp.appendChild(b);
  });
}

/* ---------- BOTONERA / NAVEGACION ---------- */
async function irInicio() {
  $("buscarInput").value = "";
  await pintarBotonera();
}

// Pinta la botonera normal SIN tocar el campo de busqueda. La busqueda por
// nombre la usa para restaurar la rejilla cuando el texto es demasiado corto,
// sin borrar lo que la persona esta tecleando.
async function pintarBotonera() {
  $("breadcrumb").textContent = "Venta";
  const data = await api("/tpv/api/botonera");
  const grid = $("grid");
  grid.style.gridTemplateColumns = `repeat(${data.pagina.columnas}, 1fr)`;
  // El inicio SI llena la columna a lo alto: filas 1fr (a diferencia de la
  // navegacion/buscador, que usan tarjetas de altura fija via grid-auto-rows).
  grid.style.gridTemplateRows = `repeat(${data.pagina.filas}, minmax(0, 1fr))`;
  grid.innerHTML = "";
  for (const b of data.botones) {
    const btn = document.createElement("button");
    btn.className = "btn b-" + b.tipo;
    btn.style.gridColumn = `${b.columna + 1} / span ${b.ancho}`;
    btn.style.gridRow = `${b.fila + 1} / span ${b.alto}`;
    if (b.color) btn.style.background = b.color;
    if (b.tipo === "articulo") {
      pintarContenido(btn, b.articulo.imagen, b.articulo.nombre_corto, precioBoton(b.articulo));
      btn.onclick = () => anadir(b.articulo);
    } else if (b.tipo === "familia") {
      pintarContenido(btn, b.familia.imagen, b.texto || b.familia.nombre);
      btn.onclick = () => abrirFamilia(b.familia.id);
    } else {
      pintarContenido(btn, null, b.texto || b.funcion);
      btn.onclick = () => ejecutarFuncion(b.funcion);
    }
    grid.appendChild(btn);
  }
}

async function abrirFamilia(id) {
  const fam = await api("/tpv/api/familia/" + id);
  $("breadcrumb").textContent = "Venta › " + fam.nombre;
  const grid = $("grid");
  grid.style.gridTemplateColumns = "repeat(4, 1fr)";
  grid.style.gridTemplateRows = "none";  // tarjetas de altura fija (grid-auto-rows)
  grid.innerHTML = "";
  for (const sf of fam.subfamilias) {
    const b = document.createElement("button");
    b.className = "btn b-familia";
    pintarContenido(b, sf.imagen, sf.nombre);
    b.onclick = () => abrirFamilia(sf.id); grid.appendChild(b);
  }
  for (const a of fam.articulos) {
    const b = document.createElement("button");
    b.className = "btn b-articulo";
    pintarContenido(b, a.imagen, a.nombre_corto, precioBoton(a));
    b.onclick = () => anadir(a); grid.appendChild(b);
  }
}

/* ---------- BUSCADOR (lupa, debounce) ---------- */
let tBuscarDebounce = null;
function onBuscarInput() {
  clearTimeout(tBuscarDebounce);
  const q = $("buscarInput").value.trim();
  // Menos de 2 caracteres: no dispara peticion, restaura la botonera normal
  // SIN borrar el campo (irInicio lo vaciaria y romperia el tecleo progresivo).
  if (q.length < 2) { pintarBotonera(); return; }
  tBuscarDebounce = setTimeout(() => buscar(q), 250);
}

async function buscar(q) {
  const resultados = await api("/tpv/api/buscar?q=" + encodeURIComponent(q));
  $("breadcrumb").textContent = "Venta › Buscar: " + q;
  const grid = $("grid");
  grid.style.gridTemplateColumns = "repeat(4, 1fr)";
  grid.style.gridTemplateRows = "none";  // tarjetas de altura fija (grid-auto-rows)
  grid.innerHTML = "";
  for (const a of resultados) {
    const b = document.createElement("button");
    b.className = "btn b-articulo";
    pintarContenido(b, a.imagen, a.nombre_corto, precioBoton(a));
    b.onclick = () => anadir(a);
    grid.appendChild(b);
  }
}

function ejecutarFuncion(f) {
  if (f === "cobrar") abrirCobro();
  else if (f === "abrir_cajon")
    api("/tpv/api/cajon", { method:"POST", body: JSON.stringify({ usuario_id: usuario.usuario_id }) }).catch(()=>{});
  else alert("Funcion '" + f + "': disponible en una fase siguiente.");
}

/* ---------- CARRITO ---------- */
function anadir(articulo) {
  const modo = articulo.modo_precio;
  if (articulo.requiere_cites) alert("⚠ " + articulo.nombre_corto + " requiere documentacion CITES.");

  // Modo libre: el backend exige precio Y descripcion al cobrar (DescripcionRequerida);
  // se piden ambos ya al tocar el boton. Cada toque crea su propia linea (no se fusiona).
  if (modo === "libre") {
    const v = prompt("Precio (con IVA) para " + articulo.nombre_corto + ":", articulo.pvp);
    if (v === null) return;
    const desc = prompt("Descripcion para " + articulo.nombre_corto + ":", "");
    if (desc === null) return;
    carrito.push({ articulo_id: articulo.id, nombre_corto: articulo.nombre_corto, modo_precio: modo,
                   cantidad: 1, pvp: v.replace(",", "."), descripcion: desc.trim() || null, editado: true });
    recalcular();
    return;
  }

  // Modo al_peso: el pvp del articulo es €/kg (ya viene en el DTO); se pide el peso y se
  // envia como "cantidad" (misma formula cantidad x pvp_unitario). No se fusiona con otras lineas.
  if (modo === "al_peso") {
    const v = prompt("Peso (kg) para " + articulo.nombre_corto + ":", "1");
    if (v === null) return;
    const peso = parseFloat(String(v).replace(",", "."));
    if (!isFinite(peso) || peso <= 0) { alert("Peso no valido."); return; }
    carrito.push({ articulo_id: articulo.id, nombre_corto: articulo.nombre_corto, modo_precio: modo,
                   cantidad: peso, pvp: null, descripcion: null, editado: false });
    recalcular();
    return;
  }

  // Modo fijo: comportamiento actual (fusiona con la linea existente si no fue editada).
  const ex = carrito.find((l) => l.articulo_id === articulo.id && !l.editado);
  if (ex) ex.cantidad += 1;
  else carrito.push({ articulo_id: articulo.id, nombre_corto: articulo.nombre_corto, modo_precio: modo,
                      cantidad: 1, pvp: null, descripcion: null, editado: false });
  recalcular();
}

/* ---------- EDICION DE LINEA (cantidad / precio / descripcion) ---------- */
function editarCantidad(i) {
  const ln = ultimoCalculo.lineas[i];
  const v = prompt("Cantidad para " + ln.descripcion + ":", carrito[i].cantidad);
  if (v === null) return;
  const n = parseFloat(String(v).replace(",", "."));
  if (!isFinite(n) || n <= 0) { alert("Cantidad no valida."); return; }
  carrito[i].cantidad = n;
  recalcular();
}

function editarPrecio(i) {
  const ln = ultimoCalculo.lineas[i];
  const v = prompt("Precio (con IVA) para " + ln.descripcion + ":", ln.pvp);
  if (v === null) return;
  const texto = String(v).replace(",", ".");
  if (!texto || isNaN(parseFloat(texto))) { alert("Precio no valido."); return; }
  carrito[i].pvp = texto;
  carrito[i].editado = true;
  recalcular();
}

function editarDescripcion(i) {
  const ln = ultimoCalculo.lineas[i];
  const v = prompt("Descripcion de la linea:", ln.descripcion);
  if (v === null) return;
  carrito[i].descripcion = v.trim() || null;
  carrito[i].editado = true;
  recalcular();
}

async function recalcular() {
  if (!carrito.length) { ultimoCalculo = null; $("total").innerHTML = "0,00 &euro;"; render(); return; }
  const items = carrito.map((l) => ({ articulo_id: l.articulo_id, cantidad: String(l.cantidad),
                                      pvp: l.pvp, descripcion: l.descripcion }));
  ultimoCalculo = await api("/tpv/api/calcular", { method:"POST", body:JSON.stringify({ items }) });
  $("total").textContent = eur(ultimoCalculo.total);
  render();
}

function render() {
  const cont = $("carrito"); cont.innerHTML = "";
  const lineas = ultimoCalculo ? ultimoCalculo.lineas : [];
  lineas.forEach((ln, i) => {
    const div = document.createElement("div"); div.className = "linea";
    const esAlPeso = carrito[i].modo_precio === "al_peso";
    div.innerHTML = `<div class="desc"><span class="editable" data-accion="descripcion">${ln.descripcion}</span>
        <div class="cant"><span class="editable" data-accion="cantidad">${carrito[i].cantidad}${esAlPeso ? " kg" : ""}</span> ×
        <span class="editable" data-accion="precio">${eur(ln.pvp)}${esAlPeso ? "/kg" : ""}</span>
        &middot; IVA ${ln.tipo_iva.replace(".",",")}%</div></div>
      <div class="tot">${eur(ln.total)}</div>`;
    div.querySelector('[data-accion="descripcion"]').onclick = () => editarDescripcion(i);
    div.querySelector('[data-accion="cantidad"]').onclick = () => editarCantidad(i);
    div.querySelector('[data-accion="precio"]').onclick = () => editarPrecio(i);
    const quita = document.createElement("button");
    quita.className = "quita"; quita.textContent = "×";
    quita.onclick = () => { carrito.splice(i, 1); recalcular(); };
    div.appendChild(quita); cont.appendChild(div);
  });
}
function vaciar() { carrito = []; recalcular(); }

/* ---------- COBRO ---------- */
function abrirCobro() {
  if (!ultimoCalculo) { alert("El ticket esta vacio."); return; }
  const total = ultimoCalculo.total;
  const ov = document.createElement("div"); ov.className = "overlay";
  ov.innerHTML = `<div class="modal"><h2>Cobrar ${eur(total)}</h2>
    <input class="campo" id="efectivo" inputmode="decimal" value="${total.replace(".",",")}">
    <div class="rapidos" id="rapidos"></div>
    <div class="msg-error" id="ce"></div>
    <div class="fila-modal">
      <button class="btn b-vaciar" style="flex:0 0 40%" onclick="this.closest('.overlay').remove()">Cancelar</button>
      <button class="btn b-cobrar" id="btnCobrar">Efectivo</button>
    </div></div>`;
  document.body.appendChild(ov);
  const rap = ov.querySelector("#rapidos");
  ["5","10","20","50","Exacto"].forEach((v) => {
    const b = document.createElement("button"); b.className = "btn"; b.textContent = v === "Exacto" ? v : v + " €";
    b.onclick = () => { $("efectivo").value = v === "Exacto" ? total.replace(".",",") : v; };
    rap.appendChild(b);
  });
  ov.querySelector("#btnCobrar").onclick = () => cobrar(ov, "efectivo");
}

async function cobrar(ov, medio) {
  const importe = ($("efectivo").value || "0").replace(",", ".");
  const items = carrito.map((l) => ({ articulo_id: l.articulo_id, cantidad: String(l.cantidad),
                                      pvp: l.pvp, descripcion: l.descripcion }));
  try {
    const r = await api("/tpv/api/cobrar", { method:"POST", body: JSON.stringify({
      usuario_id: usuario.usuario_id, items, pagos: [{ medio, importe }] }) });
    const comprobante = esDemo
      ? `<div class="ticket-demo">DOCUMENTO DE PRUEBA<br>SIN VALIDEZ FISCAL</div>`
      : `<img src="/tpv/api/venta/${r.venta_id}/qr.png" alt="QR" width="150" height="150">
         <div style="font-size:13px;color:#94a3b8">Factura verificable en la sede electronica de la AEAT</div>`;
    ov.querySelector(".modal").innerHTML = `<div class="ticket-ok">
      <h2>&#10004; ${r.num_serie}</h2>
      <div>Total: <b>${eur(r.total)}</b></div>
      <div>Cambio: <b>${eur(r.cambio)}</b></div>
      ${comprobante}
      <div class="fila-modal"><button class="btn b-cobrar" id="cierra">Nueva venta</button></div></div>`;
    ov.querySelector("#cierra").onclick = () => { ov.remove(); vaciar(); irInicio(); };
  } catch (e) { $("ce").textContent = e.message; }
}

/* ---------- ESCANER (keyboard wedge) ---------- */
let bufEscaner = "", tEscaner = 0;
document.addEventListener("keydown", async (e) => {
  if (e.target.tagName === "INPUT") return;
  const ahora = Date.now();
  if (ahora - tEscaner > 100) bufEscaner = "";
  tEscaner = ahora;
  if (e.key === "Enter") {
    if (bufEscaner.length >= 4) {
      try { anadir(await api("/tpv/api/articulo/por-codigo/" + encodeURIComponent(bufEscaner))); }
      catch { /* codigo no encontrado */ }
    }
    bufEscaner = "";
  } else if (e.key.length === 1) { bufEscaner += e.key; }
});

/* ---------- ICONOS DECORATIVOS ---------- */
// Los iconos Phosphor viven en /static/nocturne-icons.js (window.ICONOS/icono());
// este bucle rellena los marcadores estaticos declarados en el HTML via
// data-icono (cabecera, buscador, barra de funciones). No toca el resto del
// cableado: grid/carrito/cobro siguen generando su propio markup como antes.
document.querySelectorAll("[data-icono]").forEach((el) => {
  el.innerHTML = icono(el.dataset.icono, 'aria-hidden="true"');
});

/* ---------- ARRANQUE ---------- */
function iniciar() { irInicio(); render(); }
// Resuelve el perfil activo (fuente unica: /health) para marcar el demo como
// documento de prueba y no pedir el QR de cotejo tipo-AEAT.
fetch("/health").then((r) => r.json()).then((h) => {
  esDemo = h.perfil === "demo";
  if (esDemo) $("demoBanner").style.display = "block";
}).catch(() => {});
pantallaLogin();
</script>
