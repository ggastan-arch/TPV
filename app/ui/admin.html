<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Consola · TPV AcuaTPV</title>
<style>
  :root { --bg:#0b1220; --panel:#111c30; --line:#243247; --txt:#e2e8f0; --accent:#0ea5e9;
          --ok:#16a34a; --warn:#d97706; --err:#dc2626; }
  * { box-sizing:border-box; } body { margin:0; font-family:system-ui,Segoe UI,sans-serif;
      background:var(--bg); color:var(--txt); }
  header { display:flex; align-items:center; gap:12px; padding:12px 20px; background:var(--panel);
           border-bottom:1px solid var(--line); }
  header h1 { font-size:18px; margin:0; flex:1; }
  .tabs { display:flex; gap:6px; padding:10px 20px 0; }
  .tabs button { background:var(--panel); color:var(--txt); border:1px solid var(--line);
                 border-bottom:none; border-radius:8px 8px 0 0; padding:10px 18px; cursor:pointer; }
  .tabs button.activa { background:var(--accent); color:#01121f; font-weight:700; }
  main { padding:20px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px;
          padding:16px 20px; margin-bottom:16px; }
  .kpi { font-size:40px; font-weight:800; }
  .alarma { color:#fff; background:var(--err); padding:2px 10px; border-radius:8px; font-weight:700; }
  .ok { color:var(--ok); } .warn { color:var(--warn); }
  table { width:100%; border-collapse:collapse; } th,td { text-align:left; padding:8px 10px;
          border-bottom:1px solid var(--line); font-size:14px; } th { color:#94a3b8; }
  button.accion { background:var(--accent); color:#01121f; border:none; border-radius:8px;
                  padding:10px 16px; font-weight:700; cursor:pointer; }
  .grid2 { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px; }
  .dato b { display:block; color:#94a3b8; font-weight:500; font-size:13px; }
  /* imagen de articulo/familia (subida + preview) */
  .img-cell { display:flex; align-items:center; gap:8px; }
  .thumb-imagen { width:40px; height:40px; object-fit:cover; border-radius:6px; border:1px solid var(--line); }
  .thumb-vacio { font-size:12px; color:#94a3b8; }
  .btn-subir-imagen { background:var(--accent); color:#01121f; border:none; border-radius:6px;
                      padding:4px 8px; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap; }
  .msg-imagen { font-size:12px; color:#fca5a5; min-width:120px; }
  /* login */
  .login { max-width:360px; margin:12vh auto; }
  .login input { width:100%; padding:12px; margin:8px 0; border-radius:8px; border:1px solid var(--line);
                 background:#0b1220; color:#fff; font-size:16px; }
  .login button { width:100%; padding:12px; }
  .msg-error { color:#fca5a5; min-height:20px; }
  .banner-demo { background:var(--err); color:#fff; text-align:center; font-weight:800;
                 letter-spacing:.5px; padding:6px 10px; }
  /* botoneras (editor drag & drop) */
  .rejilla-botonera { position:relative; display:grid; gap:6px; background:#0b1220;
                       padding:6px; border-radius:8px; min-height:200px; }
  .celda-vacia { background:rgba(255,255,255,.03); border:1px dashed var(--line); border-radius:6px; }
  .boton-editor { position:relative; border-radius:8px; padding:8px; color:#fff; font-size:13px;
                  cursor:grab; display:flex; align-items:center; justify-content:center;
                  overflow:hidden; text-align:center; }
  .boton-editor.seleccionado { outline:3px solid var(--accent); }
  .boton-editor.boton-error { outline:3px solid var(--err); }
  .boton-editor .quitar { position:absolute; top:2px; right:2px; background:rgba(0,0,0,.45);
                           color:#fff; border:none; border-radius:4px; width:20px; height:20px;
                           cursor:pointer; line-height:1; }
  .boton-editor .resize { position:absolute; right:0; bottom:0; width:16px; height:16px;
                           cursor:nwse-resize; background:rgba(255,255,255,.35);
                           border-top-left-radius:6px; }
  .paleta-item { padding:8px 10px; margin-bottom:6px; border-radius:8px; cursor:grab; font-size:13px; }
  .paleta-articulo { background:#0369a1; color:#fff; }
  .paleta-familia { background:#7c3aed; color:#fff; }
  .paleta-funcion { background:#475569; color:#fff; }
  .panel-edicion label { display:block; margin-top:8px; font-size:13px; color:#94a3b8; }
  .panel-edicion input { width:100%; padding:8px; border-radius:8px; border:1px solid var(--line);
                          background:#0b1220; color:#fff; margin-top:4px; }
  .overlay { position:fixed; inset:0; background:rgba(2,6,23,.85); display:flex;
             align-items:center; justify-content:center; z-index:20; }
  .modal { background:var(--panel); border-radius:16px; padding:24px; width:min(92vw,420px); }
  .modal label { display:block; margin-top:10px; font-size:13px; color:#94a3b8; }
  .modal input { width:100%; padding:10px; border-radius:8px; border:1px solid var(--line);
                 background:#0b1220; color:#fff; font-size:15px; margin-top:4px; }
  .fila-modal { display:flex; gap:10px; margin-top:16px; }
  .fila-modal .accion { flex:1; }
</style>
</head>
<body>
<div id="banner-demo"></div>
<div id="root"></div>

<script>
"use strict";
const $ = (s, r=document) => r.querySelector(s);
async function api(path, opts={}) {
  const r = await fetch(path, { headers:{ "Content-Type":"application/json" }, ...opts });
  if (!r.ok) throw new Error((await r.json().catch(()=>({}))).detail || ("Error "+r.status));
  return r.json();
}
const eur = (s) => (s ?? "0.00").toString().replace(".", ",") + " €";

/* ---- LOGIN ---- */
function vistaLogin(msg="") {
  $("#root").innerHTML = `<div class="login card"><h1>Consola de administración</h1>
    <input id="nombre" placeholder="Usuario" autocomplete="username">
    <input id="password" type="password" placeholder="Contraseña" autocomplete="current-password">
    <div class="msg-error" id="err">${msg}</div>
    <button class="accion" id="entrar">Entrar</button></div>`;
  $("#entrar").onclick = async () => {
    try {
      await api("/admin/api/login", { method:"POST",
        body: JSON.stringify({ nombre:$("#nombre").value, password:$("#password").value }) });
      dashboard();
    } catch(e) { $("#err").textContent = e.message; }
  };
  $("#password").addEventListener("keydown", (e) => { if (e.key==="Enter") $("#entrar").click(); });
}

/* ---- DASHBOARD ---- */
let pestanaActual = "fiscal";
async function dashboard() {
  const me = await api("/admin/api/me");
  $("#root").innerHTML = `
    <header><h1>TPV AcuaTPV · Administración</h1>
      <span>${me.nombre}</span>
      <a href="/tpv/" class="accion" id="irTpv" style="text-decoration:none;display:inline-block">Ir al TPV</a>
      ${window.esDemo ? "" : '<button class="accion" id="salir">Salir</button>'}
    </header>
    <div class="tabs">
      <button data-t="fiscal">Fiscal</button>
      <button data-t="dia">Día</button>
      <button data-t="maestros">Maestros</button>
      <button data-t="botoneras">Botoneras</button>
    </div><main id="main"></main>`;
  // En demo el acceso es libre (sin sesion que cerrar, ver require_admin_demo);
  // el boton "Salir" ni se monta (null-check: el resto del codigo no asume su
  // existencia).
  const btnSalir = $("#salir");
  if (btnSalir) btnSalir.onclick = async () => { await api("/admin/api/logout",{method:"POST"}); vistaLogin(); };
  document.querySelectorAll(".tabs button").forEach((b) =>
    b.onclick = () => { pestanaActual = b.dataset.t; pintarPestana(); });
  pintarPestana();
}

function marcarTab() {
  document.querySelectorAll(".tabs button").forEach((b) =>
    b.classList.toggle("activa", b.dataset.t === pestanaActual));
}

async function pintarPestana() {
  marcarTab();
  if (pestanaActual === "fiscal") return pintarFiscal();
  if (pestanaActual === "dia") return pintarDia();
  if (pestanaActual === "botoneras") return pintarBotoneras();
  return pintarMaestros();
}

/* ---- FISCAL ---- */
async function pintarFiscal() {
  const d = await api("/admin/api/fiscal/estado");
  const dr = d.declaracion_responsable;
  // "requiere_intervencion" es la alarma de mayor prioridad: registros terminales que
  // ya no se reintentan solos (R3) y necesitan accion explicita del administrador.
  const alarma = d.cola.requiere_intervencion
    ? `<span class="alarma">REQUIERE INTERVENCIÓN</span>`
    : d.cola.incidencia
    ? `<span class="alarma">INCIDENCIA</span>` : (d.cola.pendientes ? `<span class="warn">pendientes</span>` : `<span class="ok">al día</span>`);
  const cadena = d.cadena.ok ? `<span class="ok">✔ cadena íntegra (${d.cadena.registros} registros)</span>`
    : `<span class="alarma">✖ cadena con errores: ${d.cadena.errores.join("; ")}</span>`;
  // Bloque de "requiere intervención" + último error: persistente entre refrescos
  // (R4), no depende de haber lanzado una remisión en esta misma sesión.
  const bloqueIntervencion = d.cola.requiere_intervencion
    ? `<div class="card"><h2><span class="alarma">REQUIERE INTERVENCIÓN</span></h2>
        <div class="grid2">
          <div><div class="kpi">${d.cola.requiere_intervencion}</div>registro(s) fuera de la cola automática</div>
          ${d.ultimo_error ? `
          <div class="dato"><b>Último error AEAT</b>${d.ultimo_error.codigo ? `[${d.ultimo_error.codigo}] ` : ""}${d.ultimo_error.descripcion ?? "—"}</div>
          <div class="dato"><b>Nº serie</b>${d.ultimo_error.num_serie ?? "—"}</div>` : ""}
        </div>
        <p><button class="accion" id="reencolar">Reencolar y reintentar</button> <span id="remsg"></span></p>
      </div>`
    : "";
  $("#main").innerHTML = `
    <div class="card"><h2>Cola de remisión ${alarma}</h2>
      <div class="grid2">
        <div><div class="kpi">${d.cola.pendientes}</div>registros pendientes de remitir</div>
        <div class="dato"><b>Certificado</b>${d.cola.certificado_configurado ? "configurado" : "NO configurado"}</div>
        <div class="dato"><b>Integridad</b>${cadena}</div>
      </div>
      <p><button class="accion" id="reintentar">Reintentar remisión</button> <span id="rmsg"></span></p>
      ${window.esDemo ? `<p style="color:#94a3b8;font-size:13px;font-style:italic;margin:6px 0 0">
        En modo demo no se remite a la AEAT (motor NullEngine): "pendientes" y "certificado NO
        configurado" son el estado esperado, no un error.</p>` : ""}
    </div>
    ${bloqueIntervencion}
    <div class="card"><h2>Declaración responsable</h2><div class="grid2">
      <div class="dato"><b>Software</b>${dr.software} (${dr.id_sistema}) v${dr.version}</div>
      <div class="dato"><b>Productor</b>${dr.productor} · ${dr.nif_productor}</div>
      <div class="dato"><b>Obligado</b>${dr.obligado} · ${dr.nif_obligado}</div>
      <div class="dato"><b>Entorno AEAT</b>${dr.entorno}</div>
    </div></div>
    <div class="card"><h2>Últimos registros</h2>
      <table><thead><tr><th>#</th><th>Tipo</th><th>Nº serie</th><th>Remisión</th><th>Huella</th></tr></thead>
      <tbody>${d.ultimos_registros.map(r =>
        `<tr><td>${r.orden}</td><td>${r.tipo}</td><td>${r.num_serie}</td><td>${r.estado_remision}</td><td><code>${r.huella}</code></td></tr>`).join("")}</tbody></table>
    </div>`;
  $("#reintentar").onclick = async () => {
    const r = await api("/admin/api/fiscal/reintentar", { method:"POST" });
    $("#rmsg").textContent = r.ok ? `Enviado (${r.estado_envio})` : r.mensaje;
    if (r.ok) pintarFiscal();
  };
  const btnReencolar = $("#reencolar");
  if (btnReencolar) {
    btnReencolar.onclick = async () => {
      // Reencola el registro del ultimo error (recuperacion manual, R3). Si hubiera
      // varios registros en requiere_intervencion, este boton actua sobre el mas
      // reciente; el resto se reencola igual tras corregir la causa raiz (recarga
      // el panel entre reencolados sucesivos).
      const r = await api("/admin/api/fiscal/reencolar", {
        method: "POST", body: { registro_id: d.ultimo_error.registro_id },
      });
      $("#remsg").textContent = r.ok ? "Reencolado: volverá a intentarse." : (r.mensaje ?? "Error al reencolar.");
      if (r.ok) pintarFiscal();
    };
  }
}

/* ---- DÍA ---- */
async function pintarDia() {
  const d = await api("/admin/api/informes/dia");
  const medios = Object.entries(d.por_medio).map(([m,v]) => `<div class="dato"><b>${m}</b>${eur(v)}</div>`).join("") || "—";
  $("#main").innerHTML = `<div class="card"><h2>Resumen del día (${d.fecha})</h2>
    <div class="grid2">
      <div><div class="kpi">${d.num_ventas}</div>ventas cobradas</div>
      <div><div class="kpi">${eur(d.total)}</div>total facturado</div>
    </div><h3>Por forma de pago</h3><div class="grid2">${medios}</div></div>`;
}

/* ---- MAESTROS ---- */
// Imagen de articulo/familia: se sube al endpoint multipart dedicado (nunca por el
// PUT JSON de la ficha) y se previsualiza desde la ruta /media/... que devuelve el
// backend en el listado de maestros.
function celdaImagen(tipo, r) {
  return `<div class="img-cell" data-tipo="${tipo}" data-id="${r.id}">
      ${r.imagen ? `<img src="${r.imagen}" class="thumb-imagen" alt="Imagen de ${r.nombre}">`
                  : `<span class="thumb-vacio">Sin imagen</span>`}
      <label class="btn-subir-imagen">Subir<input type="file" accept="image/*" class="input-imagen" hidden></label>
      <span class="msg-imagen"></span>
    </div>`;
}

async function subirImagenMaestro(tipo, id, archivo) {
  const datos = new FormData();
  datos.append("archivo", archivo);
  // Multipart: NO se usa el helper `api()` (fija Content-Type: application/json);
  // el navegador debe fijar el boundary del multipart automaticamente.
  const r = await fetch(`/admin/api/maestros/${tipo}/${id}/imagen`, { method: "POST", body: datos });
  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).detail || ("Error " + r.status));
  return r.json();
}

function activarSubidaImagenes() {
  document.querySelectorAll(".img-cell").forEach((celda) => {
    const input = celda.querySelector(".input-imagen");
    const msg = celda.querySelector(".msg-imagen");
    input.onchange = async () => {
      const archivo = input.files[0];
      if (!archivo) return;
      msg.textContent = "";
      try {
        await subirImagenMaestro(celda.dataset.tipo, celda.dataset.id, archivo);
        await pintarMaestros();
      } catch (e) {
        msg.textContent = e.message;
        input.value = "";
      }
    };
  });
}

// Cache en memoria de tipos de IVA/familias del ultimo pintado: los usa el modal de
// alta/edicion de articulo sin volver a pedirlos al servidor.
let maIvasCache = [];
let maFamiliasCache = [];
const MODO_PRECIO_LABEL = { fijo: "Fijo", libre: "Libre", al_peso: "Al peso (€/kg)" };

async function pintarMaestros() {
  const [arts, ivas, fams, users] = await Promise.all([
    api("/admin/api/maestros/articulos"), api("/admin/api/maestros/tipos-iva"),
    api("/admin/api/maestros/familias"), api("/admin/api/maestros/usuarios")]);
  maIvasCache = ivas;
  maFamiliasCache = fams;
  const tabla = (t, cols, rows) => `<div class="card"><h2>${t}</h2><table>
    <thead><tr>${cols.map(c=>`<th>${c[0]}</th>`).join("")}</tr></thead>
    <tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${c[1](r)}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`;
  $("#main").innerHTML =
    `<div class="card" style="display:flex;justify-content:flex-end;gap:8px">
      <button class="accion" id="maNuevaFamilia">+ Nueva familia</button>
      <button class="accion" id="maNuevoArticulo">+ Nuevo artículo</button>
    </div>` +
    tabla("Artículos", [["Nombre",r=>r.nombre],["PVP",r=>eur(r.pvp)],["IVA",r=>r.tipo_iva+"%"],
      ["Modo de precio",r=>MODO_PRECIO_LABEL[r.modo_precio] || r.modo_precio],
      ["CITES",r=>r.requiere_cites?"sí":""],["Activo",r=>r.activo?"sí":"no"],
      ["Imagen",r=>celdaImagen("articulos", r)],
      ["",r=>`<button class="accion" data-editar-articulo="${r.id}">Editar</button>`]], arts) +
    tabla("Tipos de IVA", [["Nombre",r=>r.nombre],["%",r=>r.porcentaje],["Activo",r=>r.activo?"sí":"no"]], ivas) +
    tabla("Familias", [["Nombre",r=>r.nombre],["Padre",r=>nombreFamilia(r.parent_id, fams)],
      ["Visible táctil",r=>r.visible_en_tactil?"sí":"no"],["Activo",r=>r.activo?"sí":"no"],
      ["Imagen",r=>celdaImagen("familias", r)],
      ["",r=>`<button class="accion" data-editar-familia="${r.id}">Editar</button>`]], fams) +
    tabla("Usuarios", [["Nombre",r=>r.nombre],["Rol",r=>r.rol],["Activo",r=>r.activo?"sí":"no"]], users);
  activarSubidaImagenes();
  $("#maNuevoArticulo").onclick = () => modalArticulo(null);
  document.querySelectorAll("[data-editar-articulo]").forEach((btn) => {
    const art = arts.find((a) => a.id === Number(btn.dataset.editarArticulo));
    btn.onclick = () => modalArticulo(art);
  });
  $("#maNuevaFamilia").onclick = () => modalFamilia(null);
  document.querySelectorAll("[data-editar-familia]").forEach((btn) => {
    const fam = fams.find((f) => f.id === Number(btn.dataset.editarFamilia));
    btn.onclick = () => modalFamilia(fam);
  });
}

// Nombre legible de una familia por id (para la columna "Padre"), con fallback.
function nombreFamilia(id, fams) {
  if (id == null) return "—";
  const f = fams.find((x) => x.id === id);
  return f ? f.nombre : ("#" + id);
}

/* -- alta / edicion de articulo (modo_precio: fijo|libre|al_peso) -- */
// El listado GET /admin/api/maestros/articulos expone TODOS los campos editables
// (nombre_corto, tipo_iva_id, familia_id, coste, color_boton, icono ademas de lo
// basico), asi que el modal de edicion precarga la ficha completa y "Guardar" sin
// tocar nada conserva los valores existentes (el PUT reemplaza la ficha completa,
// pero ahora el formulario siempre parte de los datos reales del articulo).
const COLOR_BOTON_DEFAULT = "#0369a1";

function modalArticulo(articulo) {
  const editando = !!articulo;
  const opcionesIva = maIvasCache.map((i) =>
    `<option value="${i.id}" ${editando && articulo.tipo_iva_id === i.id ? "selected" : ""}>${i.nombre} (${i.porcentaje}%)</option>`
  ).join("");
  const opcionesFamilia = `<option value="">— sin familia —</option>` +
    maFamiliasCache.map((f) =>
      `<option value="${f.id}" ${editando && articulo.familia_id === f.id ? "selected" : ""}>${f.nombre}</option>`
    ).join("");
  const modos = ["fijo", "libre", "al_peso"];
  const opcionesModo = modos.map((m) =>
    `<option value="${m}" ${editando && articulo.modo_precio === m ? "selected" : ""}>${MODO_PRECIO_LABEL[m]}</option>`
  ).join("");

  const ov = document.createElement("div");
  ov.className = "overlay";
  ov.innerHTML = `<div class="modal">
    <h2>${editando ? "Editar artículo" : "Nuevo artículo"}</h2>
    <label>Nombre<input id="maNombre" value="${editando ? (articulo.nombre || "").replace(/"/g, "&quot;") : ""}"></label>
    <label>Nombre corto<input id="maNombreCorto" value="${editando ? (articulo.nombre_corto || "").replace(/"/g, "&quot;") : ""}"></label>
    <label>Tipo de IVA<select id="maTipoIva">${opcionesIva}</select></label>
    <label id="maLabelPvp">PVP (con IVA)<input id="maPvp" inputmode="decimal" value="${editando ? articulo.pvp : ""}"></label>
    <label>Familia<select id="maFamilia">${opcionesFamilia}</select></label>
    <label>Coste<input id="maCoste" inputmode="decimal" value="${editando && articulo.coste != null ? articulo.coste : ""}"></label>
    <label>Modo de precio<select id="maModoPrecio">${opcionesModo}</select></label>
    <label><input id="maControlStock" type="checkbox" style="width:auto" ${editando && articulo.control_stock ? "checked" : ""}> Control de stock</label>
    <label><input id="maCites" type="checkbox" style="width:auto" ${editando && articulo.requiere_cites ? "checked" : ""}> Requiere CITES</label>
    <label>Color del botón<input id="maColor" type="color" value="${editando ? (articulo.color_boton || COLOR_BOTON_DEFAULT) : COLOR_BOTON_DEFAULT}"></label>
    <label>Icono (emoji o texto corto)<input id="maIcono" value="${editando ? (articulo.icono || "").replace(/"/g, "&quot;") : ""}"></label>
    <div class="msg-error" id="maError"></div>
    <div class="fila-modal">
      <button class="accion" id="maCancelar" style="background:#475569">Cancelar</button>
      <button class="accion" id="maGuardar">Guardar</button>
    </div></div>`;
  document.body.appendChild(ov);

  const actualizarLabelPvp = () => {
    $("#maLabelPvp", ov).firstChild.textContent =
      $("#maModoPrecio", ov).value === "al_peso" ? "PVP (€/kg)" : "PVP (con IVA)";
  };
  $("#maModoPrecio", ov).onchange = actualizarLabelPvp;
  actualizarLabelPvp();

  $("#maCancelar", ov).onclick = () => ov.remove();
  $("#maGuardar", ov).onclick = async () => {
    const datos = {
      nombre: $("#maNombre", ov).value,
      nombre_corto: $("#maNombreCorto", ov).value,
      tipo_iva_id: Number($("#maTipoIva", ov).value),
      pvp: $("#maPvp", ov).value.replace(",", "."),
      familia_id: $("#maFamilia", ov).value ? Number($("#maFamilia", ov).value) : null,
      coste: $("#maCoste", ov).value ? $("#maCoste", ov).value.replace(",", ".") : null,
      control_stock: $("#maControlStock", ov).checked,
      modo_precio: $("#maModoPrecio", ov).value,
      requiere_cites: $("#maCites", ov).checked,
      color_boton: $("#maColor", ov).value || null,
      icono: $("#maIcono", ov).value || null,
      codigos: [],
    };
    try {
      if (editando) {
        await api(`/admin/api/maestros/articulos/${articulo.id}`, { method: "PUT", body: JSON.stringify(datos) });
      } else {
        await api("/admin/api/maestros/articulos", { method: "POST", body: JSON.stringify(datos) });
      }
      ov.remove();
      await pintarMaestros();
    } catch (e) { $("#maError", ov).textContent = e.message; }
  };
}

/* -- alta / edicion de familia (incluye "visible en tactil") -- */
// El GET /admin/api/maestros/familias expone nombre, parent_id, orden, color y
// visible_en_tactil, asi que el modal precarga la ficha completa y "Guardar" (PUT,
// reemplazo total) conserva los valores no tocados. La imagen NO va aqui: se sube
// por su endpoint dedicado desde la columna "Imagen".
function modalFamilia(familia) {
  const editando = !!familia;
  const opcionesPadre = `<option value="">— sin padre (raíz) —</option>` +

        `<option value="${f.id}" ${editando && familia.parent_id === f.id ? "selected" : ""}>${f.nombre}</option>`
      ).join("");

  const ov = document.createElement("div");
  ov.className = "overlay";
  ov.innerHTML = `<div class="modal">
    <h2>${editando ? "Editar familia" : "Nueva familia"}</h2>
    <label>Nombre<input id="mfNombre" value="${editando ? (familia.nombre || "").replace(/"/g, "&quot;") : ""}"></label>
    <label>Familia padre<select id="mfPadre">${opcionesPadre}</select></label>
    <label>Orden<input id="mfOrden" inputmode="numeric" value="${editando ? familia.orden : 0}"></label>
    <label>Color<input id="mfColor" type="color" value="${editando ? (familia.color || COLOR_BOTON_DEFAULT) : COLOR_BOTON_DEFAULT}"></label>
    <label><input id="mfVisible" type="checkbox" style="width:auto" ${!editando || familia.visible_en_tactil ? "checked" : ""}> Visible en la navegación táctil</label>
    <p style="font-size:12px;opacity:.7;margin:0">Desmárcalo para familias de código de barras (material, complementos…): no aparecen al navegar en el TPV, pero sus artículos se venden igual por escáner o buscador.</p>
    <div class="msg-error" id="mfError"></div>
    <div class="fila-modal">
      <button class="accion" id="mfCancelar" style="background:#475569">Cancelar</button>
      <button class="accion" id="mfGuardar">Guardar</button>
    </div></div>`;
  document.body.appendChild(ov);

  $("#mfCancelar", ov).onclick = () => ov.remove();
  $("#mfGuardar", ov).onclick = async () => {
    const datos = {
      nombre: $("#mfNombre", ov).value,
      parent_id: $("#mfPadre", ov).value ? Number($("#mfPadre", ov).value) : null,
      orden: Number($("#mfOrden", ov).value) || 0,
      color: $("#mfColor", ov).value || null,
      visible_en_tactil: $("#mfVisible", ov).checked,
    };
    try {
      if (editando) {
        await api(`/admin/api/maestros/familias/${familia.id}`, { method: "PUT", body: JSON.stringify(datos) });
      } else {
        await api("/admin/api/maestros/familias", { method: "POST", body: JSON.stringify(datos) });
      }
      ov.remove();
      await pintarMaestros();
    } catch (e) { $("#mfError", ov).textContent = e.message; }
  };
}

/* ---- BOTONERAS (editor drag & drop) ---- */
// Estado del editor: perfil/pagina seleccionados, copia de trabajo EN MEMORIA de los
// botones de la pagina actual (no se persiste hasta pulsar "Guardar") y el destino que
// se esta arrastrando (boton existente o item de la paleta). El backend es la unica
// autoridad de validez (rango/solape/destino/funcion): el editor deja arrastrar y
// redimensionar libremente y muestra los errores 422 que devuelva "Guardar".
let bbArbol = [];
let bbPerfilId = null;
let bbPaginaId = null;
let bbPaginaDims = { filas: 4, columnas: 5 };
let bbBotones = [];                 // copia de trabajo: {ref, fila, columna, ancho, alto, articulo_id, familia_id, funcion, color, icono, texto}
let bbBotonSeleccionado = null;     // ref del boton con foco en el panel de edicion
let bbArrastrando = null;           // {tipo:"mover", ref} | {tipo:"crear", origen, id?, valor?, nombre}
let bbNuevoContador = 0;
let bbErrores = [];
let bbArticulos = [];
let bbFamilias = [];
const FUNCIONES_BOTONERA = [
  ["cobrar", "Cobrar"], ["convertir_factura", "Convertir en factura"],
  ["devolucion", "Devolución"], ["aparcar", "Aparcar venta"],
  ["recuperar", "Recuperar venta"], ["abrir_cajon", "Abrir cajón"],
  ["descuento", "Descuento"], ["cierre_caja", "Cierre de caja"],
];

function perfilActual() { return bbArbol.find((p) => p.id === bbPerfilId) || null; }
function paginaActual() {
  const perfil = perfilActual();
  return perfil ? (perfil.paginas.find((pg) => pg.id === bbPaginaId) || null) : null;
}

async function pintarBotoneras(preferPerfilId, preferPaginaId) {
  const [arbol, arts, fams] = await Promise.all([
    api("/admin/api/botonera"), api("/admin/api/maestros/articulos"), api("/admin/api/maestros/familias")]);
  bbArbol = arbol;
  bbArticulos = arts.filter((a) => a.activo);
  bbFamilias = fams.filter((f) => f.activo);
  if (preferPerfilId !== undefined) bbPerfilId = preferPerfilId;
  if (bbPerfilId === null || !bbArbol.some((p) => p.id === bbPerfilId)) {
    bbPerfilId = bbArbol.length ? bbArbol[0].id : null;
  }
  if (preferPaginaId !== undefined) bbPaginaId = preferPaginaId;
  seleccionarPaginaInicial();
  renderBotoneras();
}

function seleccionarPaginaInicial() {
  const perfil = perfilActual();
  if (!perfil || !perfil.paginas.length) { bbPaginaId = null; cargarBotonesEnMemoria(null); return; }
  if (!perfil.paginas.some((pg) => pg.id === bbPaginaId)) bbPaginaId = perfil.paginas[0].id;
  cargarBotonesEnMemoria(paginaActual());
}

function cargarBotonesEnMemoria(pagina) {
  bbErrores = [];
  bbBotonSeleccionado = null;
  if (!pagina) { bbBotones = []; bbPaginaDims = { filas: 4, columnas: 5 }; return; }
  bbPaginaDims = { filas: pagina.filas, columnas: pagina.columnas };
  bbBotones = pagina.botones.map((b) => ({ ...b, ref: String(b.id) }));
}

function renderBotoneras() {
  const perfil = perfilActual();
  const pagina = paginaActual();
  const selPerfil = bbArbol.length
    ? `<select id="bbSelPerfil">${bbArbol.map((p) =>
        `<option value="${p.id}" ${p.id === bbPerfilId ? "selected" : ""}>${p.nombre}${p.activo ? " (activo)" : ""}</option>`).join("")}</select>`
    : `<select id="bbSelPerfil" disabled><option>Sin perfiles</option></select>`;
  const selPagina = perfil && perfil.paginas.length
    ? `<select id="bbSelPagina">${perfil.paginas.map((pg) =>
        `<option value="${pg.id}" ${pg.id === bbPaginaId ? "selected" : ""}>${pg.nombre} (orden ${pg.orden})</option>`).join("")}</select>`
    : `<select id="bbSelPagina" disabled><option>Sin páginas</option></select>`;

  $("#main").innerHTML = `
    <div class="card">
      <h2>Botoneras</h2>
      <div class="grid2">
        <div><label>Perfil</label><br>${selPerfil}
          <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
            <button class="accion" id="bbPerfilNuevo">Nuevo</button>
            <button class="accion" id="bbPerfilRenombrar" ${perfil ? "" : "disabled"}>Renombrar</button>
            <button class="accion" id="bbPerfilActivar" ${perfil && !perfil.activo ? "" : "disabled"}>Activar</button>
            <button class="accion" id="bbPerfilBorrar" ${perfil ? "" : "disabled"}>Borrar</button>
          </div>
        </div>
        <div><label>Página</label><br>${selPagina}
          <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
            <button class="accion" id="bbPaginaNueva" ${perfil ? "" : "disabled"}>Nueva</button>
            <button class="accion" id="bbPaginaEditar" ${pagina ? "" : "disabled"}>Editar</button>
            <button class="accion" id="bbPaginaBorrar" ${pagina ? "" : "disabled"}>Borrar</button>
          </div>
        </div>
      </div>
    </div>
    <div class="card" style="display:flex;gap:20px;flex-wrap:wrap">
      <div style="flex:2;min-width:320px">
        <h3>Rejilla ${pagina ? `(${pagina.filas} × ${pagina.columnas})` : ""}</h3>
        <div id="bbRejilla" class="rejilla-botonera"></div>
        <div class="msg-error" id="bbErrores"></div>
        <p><button class="accion" id="bbGuardar" ${pagina ? "" : "disabled"}>Guardar</button> <span id="bbMsg"></span></p>
      </div>
      <div style="flex:1;min-width:200px">
        <h3>Paleta de destinos</h3>
        <div id="bbPaleta"></div>
      </div>
      <div style="flex:1;min-width:200px">
        <h3>Editar botón</h3>
        <div id="bbPanelEdicion" class="panel-edicion"></div>
      </div>
    </div>`;

  if (bbArbol.length) $("#bbSelPerfil").onchange = (e) => {
    bbPerfilId = Number(e.target.value); bbPaginaId = null; seleccionarPaginaInicial(); renderBotoneras();
  };
  if (perfil && perfil.paginas.length) $("#bbSelPagina").onchange = (e) => {
    bbPaginaId = Number(e.target.value); cargarBotonesEnMemoria(paginaActual()); renderBotoneras();
  };
  $("#bbPerfilNuevo").onclick = crearPerfilBotonera;
  $("#bbPerfilRenombrar").onclick = renombrarPerfilBotonera;
  $("#bbPerfilActivar").onclick = activarPerfilBotonera;
  $("#bbPerfilBorrar").onclick = borrarPerfilBotonera;
  $("#bbPaginaNueva").onclick = () => modalPagina(null);
  $("#bbPaginaEditar").onclick = () => modalPagina(paginaActual());
  $("#bbPaginaBorrar").onclick = borrarPaginaBotonera;
  $("#bbGuardar").onclick = guardarLayoutBotonera;

  renderRejilla();
  renderPaleta();
  renderPanelEdicion();
  renderErroresLayout();
}

/* -- rejilla: render, drag&drop, resize -- */
function renderRejilla() {
  const cont = $("#bbRejilla");
  if (!paginaActual()) { cont.innerHTML = "<p>Seleccioná o creá una página para esta botonera.</p>"; return; }
  const { filas, columnas } = bbPaginaDims;
  cont.style.gridTemplateColumns = `repeat(${columnas}, minmax(70px,1fr))`;
  cont.style.gridTemplateRows = `repeat(${filas}, 70px)`;
  cont.innerHTML = "";
  for (let f = 0; f < filas; f++) {
    for (let c = 0; c < columnas; c++) {
      const celda = document.createElement("div");
      celda.className = "celda-vacia";
      celda.style.gridColumn = `${c + 1} / span 1`;
      celda.style.gridRow = `${f + 1} / span 1`;
      celda.ondragover = (e) => e.preventDefault();
      celda.ondrop = (e) => { e.preventDefault(); manejarDropBotonera(f, c); };
      cont.appendChild(celda);
    }
  }
  bbBotones.forEach((b) => cont.appendChild(crearElementoBoton(b)));
}

function descripcionDestino(b) {
  if (b.articulo_id != null) {
    const a = bbArticulos.find((x) => x.id === b.articulo_id);
    return a ? a.nombre : ("Artículo #" + b.articulo_id);
  }
  if (b.familia_id != null) {
    const f = bbFamilias.find((x) => x.id === b.familia_id);
    return f ? f.nombre : ("Familia #" + b.familia_id);
  }
  if (b.funcion) {
    const f = FUNCIONES_BOTONERA.find((x) => x[0] === b.funcion);
    return f ? f[1] : b.funcion;
  }
  return "(sin destino)";
}

function crearElementoBoton(b) {
  const div = document.createElement("div");
  div.className = "boton-editor" + (bbBotonSeleccionado === b.ref ? " seleccionado" : "");
  div.dataset.ref = b.ref;
  div.style.gridColumn = `${b.columna + 1} / span ${b.ancho}`;
  div.style.gridRow = `${b.fila + 1} / span ${b.alto}`;
  div.style.background = b.color || (b.articulo_id != null ? "#0369a1" : b.familia_id != null ? "#7c3aed" : "#475569");
  div.draggable = true;
  div.innerHTML = `<span>${b.icono ? b.icono + " " : ""}${b.texto || descripcionDestino(b)}</span>
    <button class="quitar" type="button" title="Quitar del layout">×</button>
    <div class="resize" title="Redimensionar"></div>`;
  div.ondragstart = (e) => {
    bbArrastrando = { tipo: "mover", ref: b.ref };
    e.dataTransfer.setData("text/plain", b.ref);
  };
  div.ondragover = (e) => e.preventDefault();
  div.ondrop = (e) => { e.preventDefault(); e.stopPropagation(); manejarDropBotonera(b.fila, b.columna); };
  div.onclick = () => { bbBotonSeleccionado = b.ref; renderRejilla(); renderPanelEdicion(); };
  div.querySelector(".quitar").onclick = (e) => {
    e.stopPropagation();
    bbBotones = bbBotones.filter((x) => x.ref !== b.ref);
    if (bbBotonSeleccionado === b.ref) bbBotonSeleccionado = null;
    renderRejilla(); renderPanelEdicion();
  };
  div.querySelector(".resize").onmousedown = (e) => iniciarRedimensionBoton(e, b.ref);
  return div;
}

function manejarDropBotonera(fila, columna) {
  if (!bbArrastrando) return;
  if (bbArrastrando.tipo === "mover") {
    const b = bbBotones.find((x) => x.ref === bbArrastrando.ref);
    if (b) { b.fila = fila; b.columna = columna; }
  } else if (bbArrastrando.tipo === "crear") {
    bbNuevoContador += 1;
    const nuevo = { ref: "nuevo-" + bbNuevoContador, fila, columna, ancho: 1, alto: 1,
      articulo_id: null, familia_id: null, funcion: null, color: null, icono: null, texto: null };
    if (bbArrastrando.origen === "articulo") { nuevo.articulo_id = bbArrastrando.id; nuevo.texto = bbArrastrando.nombre; }
    else if (bbArrastrando.origen === "familia") { nuevo.familia_id = bbArrastrando.id; nuevo.texto = bbArrastrando.nombre; }
    else { nuevo.funcion = bbArrastrando.valor; nuevo.texto = bbArrastrando.nombre; }
    bbBotones.push(nuevo);
    bbBotonSeleccionado = nuevo.ref;
  }
  bbArrastrando = null;
  renderRejilla();
  renderPanelEdicion();
}

function iniciarRedimensionBoton(e, ref) {
  e.preventDefault(); e.stopPropagation();
  const boton = bbBotones.find((x) => x.ref === ref);
  const cont = $("#bbRejilla");
  if (!boton || !cont) return;
  const rect = cont.getBoundingClientRect();
  const anchoCelda = rect.width / bbPaginaDims.columnas;
  const altoCelda = rect.height / bbPaginaDims.filas;
  const anchoInicial = boton.ancho, altoInicial = boton.alto;
  const xInicial = e.clientX, yInicial = e.clientY;
  function mover(ev) {
    const deltaCols = Math.round((ev.clientX - xInicial) / anchoCelda);
    const deltaFilas = Math.round((ev.clientY - yInicial) / altoCelda);
    boton.ancho = Math.max(1, anchoInicial + deltaCols);
    boton.alto = Math.max(1, altoInicial + deltaFilas);
    renderRejilla();
  }
  function soltar() {
    document.removeEventListener("mousemove", mover);
    document.removeEventListener("mouseup", soltar);
  }
  document.addEventListener("mousemove", mover);
  document.addEventListener("mouseup", soltar);
}

/* -- paleta de destinos (articulos / familias / funciones) -- */
function paletaItem(tipo, id, label, nombre) {
  return `<div class="paleta-item paleta-${tipo}" draggable="true" data-tipo="${tipo}"
             data-id="${id}" data-nombre="${nombre.replace(/"/g, "&quot;")}">${label}</div>`;
}

function renderPaleta() {
  const cont = $("#bbPaleta");
  if (!cont) return;
  const arts = bbArticulos.map((a) => paletaItem("articulo", a.id, `${a.nombre} (${eur(a.pvp)})`, a.nombre)).join("");
  const fams = bbFamilias.map((f) => paletaItem("familia", f.id, f.nombre, f.nombre)).join("");
  const funcs = FUNCIONES_BOTONERA.map(([v, label]) => paletaItem("funcion", v, label, label)).join("");
  cont.innerHTML = `<h4>Artículos</h4>${arts || "—"}<h4>Familias</h4>${fams || "—"}<h4>Funciones</h4>${funcs}`;
  cont.querySelectorAll(".paleta-item").forEach((el) => {
    el.ondragstart = (e) => {
      const { tipo, id, nombre } = el.dataset;
      bbArrastrando = tipo === "funcion"
        ? { tipo: "crear", origen: "funcion", valor: id, nombre }
        : { tipo: "crear", origen: tipo, id: Number(id), nombre };
      e.dataTransfer.setData("text/plain", tipo + ":" + id);
    };
  });
}

/* -- panel de edicion del boton seleccionado -- */
function renderPanelEdicion() {
  const cont = $("#bbPanelEdicion");
  if (!cont) return;
  const b = bbBotones.find((x) => x.ref === bbBotonSeleccionado);
  if (!b) { cont.innerHTML = "<p>Seleccioná un botón de la rejilla para editarlo.</p>"; return; }
  cont.innerHTML = `<p><b>${descripcionDestino(b)}</b></p>
    <label>Texto<input id="bbEdTexto" value="${(b.texto || "").replace(/"/g, "&quot;")}"></label>
    <label>Color<input id="bbEdColor" type="color" value="${b.color || "#0369a1"}"></label>
    <label>Icono (emoji o texto corto)<input id="bbEdIcono" value="${(b.icono || "").replace(/"/g, "&quot;")}"></label>`;
  $("#bbEdTexto").oninput = (e) => { b.texto = e.target.value; actualizarTextoBoton(b); };
  $("#bbEdColor").oninput = (e) => { b.color = e.target.value; actualizarColorBoton(b); };
  $("#bbEdIcono").oninput = (e) => { b.icono = e.target.value; actualizarTextoBoton(b); };
}
function actualizarTextoBoton(b) {
  const el = document.querySelector(`.boton-editor[data-ref="${b.ref}"] span`);
  if (el) el.textContent = (b.icono ? b.icono + " " : "") + (b.texto || descripcionDestino(b));
}
function actualizarColorBoton(b) {
  const el = document.querySelector(`.boton-editor[data-ref="${b.ref}"]`);
  if (el) el.style.background = b.color;
}

/* -- gestion de perfiles -- */
async function crearPerfilBotonera() {
  const nombre = prompt("Nombre del nuevo perfil:");
  if (!nombre) return;
  const r = await api("/admin/api/botonera/perfiles", { method: "POST", body: JSON.stringify({ nombre }) });
  await pintarBotoneras(r.id);
}
async function renombrarPerfilBotonera() {
  const perfil = perfilActual(); if (!perfil) return;
  const nombre = prompt("Nuevo nombre del perfil:", perfil.nombre);
  if (!nombre) return;
  await api(`/admin/api/botonera/perfiles/${perfil.id}`, { method: "PUT", body: JSON.stringify({ nombre }) });
  await pintarBotoneras(perfil.id);
}
async function activarPerfilBotonera() {
  const perfil = perfilActual(); if (!perfil) return;
  await api(`/admin/api/botonera/perfiles/${perfil.id}/activar`, { method: "POST" });
  await pintarBotoneras(perfil.id);
}
async function borrarPerfilBotonera() {
  const perfil = perfilActual(); if (!perfil) return;
  if (!confirm(`¿Borrar el perfil "${perfil.nombre}" y todas sus páginas/botones? Esta acción no se puede deshacer.`)) return;
  await api(`/admin/api/botonera/perfiles/${perfil.id}`, { method: "DELETE" });
  await pintarBotoneras(null);
}

/* -- gestion de paginas -- */
async function borrarPaginaBotonera() {
  const pagina = paginaActual(); if (!pagina) return;
  if (!confirm(`¿Borrar la página "${pagina.nombre}" y sus botones? Esta acción no se puede deshacer.`)) return;
  await api(`/admin/api/botonera/paginas/${pagina.id}`, { method: "DELETE" });
  await pintarBotoneras(bbPerfilId);
}

function modalPagina(pagina) {
  const editando = !!pagina;
  const ov = document.createElement("div");
  ov.className = "overlay";
  ov.innerHTML = `<div class="modal">
    <h2>${editando ? "Editar página" : "Nueva página"}</h2>
    <label>Nombre<input id="mpNombre" value="${editando ? pagina.nombre.replace(/"/g, "&quot;") : ""}"></label>
    <label>Orden<input id="mpOrden" type="number" value="${editando ? pagina.orden : 0}"></label>
    <label>Filas (1-12)<input id="mpFilas" type="number" min="1" max="12" value="${editando ? pagina.filas : 4}"></label>
    <label>Columnas (1-12)<input id="mpColumnas" type="number" min="1" max="12" value="${editando ? pagina.columnas : 5}"></label>
    <div class="msg-error" id="mpError"></div>
    <div class="fila-modal">
      <button class="accion" id="mpCancelar" style="background:#475569">Cancelar</button>
      <button class="accion" id="mpGuardar">Guardar</button>
    </div></div>`;
  document.body.appendChild(ov);
  ov.querySelector("#mpCancelar").onclick = () => ov.remove();
  ov.querySelector("#mpGuardar").onclick = async () => {
    const datos = {
      nombre: ov.querySelector("#mpNombre").value,
      orden: Number(ov.querySelector("#mpOrden").value),
      filas: Number(ov.querySelector("#mpFilas").value),
      columnas: Number(ov.querySelector("#mpColumnas").value),
    };
    try {
      if (editando) {
        await api(`/admin/api/botonera/paginas/${pagina.id}`, { method: "PUT", body: JSON.stringify(datos) });
        ov.remove();
        await pintarBotoneras(bbPerfilId, pagina.id);
      } else {
        const perfil = perfilActual();
        const r = await api(`/admin/api/botonera/perfiles/${perfil.id}/paginas`, { method: "POST", body: JSON.stringify(datos) });
        ov.remove();
        await pintarBotoneras(perfil.id, r.id);
      }
    } catch (e) { ov.querySelector("#mpError").textContent = e.message; }
  };
}

/* -- guardado del layout completo -- */
async function guardarLayoutBotonera() {
  const pagina = paginaActual();
  if (!pagina) return;
  const payload = {
    filas: bbPaginaDims.filas, columnas: bbPaginaDims.columnas,
    botones: bbBotones.map((b) => ({
      ref: b.ref, fila: b.fila, columna: b.columna, ancho: b.ancho, alto: b.alto,
      articulo_id: b.articulo_id, familia_id: b.familia_id, funcion: b.funcion,
      color: b.color, icono: b.icono, texto: b.texto,
    })),
  };
  // Fetch crudo (no el helper `api()`): el 422 de un layout invalido devuelve
  // `detail` como LISTA de errores (uno por boton), no como string unico; hay que
  // distinguirlo del resto de endpoints para poder resaltar cada `ref` afectado
  // SIN perder el estado en memoria del editor.
  const r = await fetch(`/admin/api/botonera/paginas/${pagina.id}/layout`,
    { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
  const body = await r.json().catch(() => ({}));
  if (!r.ok) {
    bbErrores = Array.isArray(body.detail) ? body.detail : [body.detail || ("Error " + r.status)];
    renderErroresLayout();
    return;
  }
  bbErrores = [];
  await pintarBotoneras(bbPerfilId, pagina.id);
  if ($("#bbMsg")) $("#bbMsg").textContent = "Guardado";
}

function renderErroresLayout() {
  const cont = $("#bbErrores");
  if (!cont) return;
  cont.innerHTML = bbErrores.length
    ? "<b>La botonera NO se guardó:</b><ul>" + bbErrores.map((e) => `<li>${e}</li>`).join("") + "</ul>"
    : "";
  document.querySelectorAll(".boton-editor").forEach((el) => el.classList.remove("boton-error"));
  bbErrores.forEach((msg) => {
    msg.split(":")[0].split("/").forEach((ref) => {
      const el = document.querySelector(`.boton-editor[data-ref="${ref.trim()}"]`);
      if (el) el.classList.add("boton-error");
    });
  });
}

}
